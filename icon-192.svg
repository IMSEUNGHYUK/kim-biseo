<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="192" height="192" rx="45" fill="#1a1a2e"/>

  <!-- Accent bar -->
  <rect y="0" width="192" height="12" rx="45" fill="#6366f1"/>

  <!-- 김비서 로봇 아이콘 -->
  <g transform="translate(96, 96)">
    <!-- Head -->
    <circle cx="0" cy="-15" r="22" fill="#e2e8f0" stroke="#6366f1" stroke-width="2"/>

    <!-- Eyes -->
    <circle cx="-8" cy="-18" r="3" fill="#1a1a2e"/>
    <circle cx="8" cy="-18" r="3" fill="#1a1a2e"/>

    <!-- Smile -->
    <path d="M -8 -10 Q 0 -5 8 -10" stroke="#1a1a2e" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Body -->
    <rect x="-18" y="8" width="36" height="28" rx="4" fill="#6366f1" stroke="#e2e8f0" stroke-width="2"/>

    <!-- Arms -->
    <rect x="-28" y="12" width="10" height="20" rx="3" fill="#38bdf8"/>
    <rect x="18" y="12" width="10" height="20" rx="3" fill="#38bdf8"/>

    <!-- Badge "24" (24시간 항상 준비) -->
    <circle cx="18" cy="-28" r="10" fill="#fb923c"/>
    <text x="18" y="-22" font-size="16" font-weight="bold" fill="#1a1a2e" text-anchor="middle">24</text>
  </g>

  <!-- Text -->
  <text x="96" y="165" font-size="20" font-weight="700" fill="#e2e8f0" text-anchor="middle">김비서</text>
</svg>
