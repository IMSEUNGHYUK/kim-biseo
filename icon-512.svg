<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="#1a1a2e"/>

  <!-- Accent bar -->
  <rect y="0" width="512" height="32" rx="120" fill="#6366f1"/>

  <!-- 김비서 로봇 아이콘 -->
  <g transform="translate(256, 256)">
    <!-- Head -->
    <circle cx="0" cy="-40" r="58" fill="#e2e8f0" stroke="#6366f1" stroke-width="5"/>

    <!-- Eyes -->
    <circle cx="-22" cy="-48" r="8" fill="#1a1a2e"/>
    <circle cx="22" cy="-48" r="8" fill="#1a1a2e"/>

    <!-- Smile -->
    <path d="M -22 -28 Q 0 -14 22 -28" stroke="#1a1a2e" stroke-width="5" fill="none" stroke-linecap="round"/>

    <!-- Body -->
    <rect x="-48" y="22" width="96" height="74" rx="10" fill="#6366f1" stroke="#e2e8f0" stroke-width="5"/>

    <!-- Arms -->
    <rect x="-74" y="32" width="26" height="54" rx="8" fill="#38bdf8"/>
    <rect x="48" y="32" width="26" height="54" rx="8" fill="#38bdf8"/>

    <!-- Badge "24" (24시간 항상 준비) -->
    <circle cx="48" cy="-74" r="26" fill="#fb923c"/>
    <text x="48" y="-58" font-size="42" font-weight="bold" fill="#1a1a2e" text-anchor="middle">24</text>
  </g>

  <!-- Text -->
  <text x="256" y="440" font-size="56" font-weight="700" fill="#e2e8f0" text-anchor="middle">김비서</text>
</svg>
