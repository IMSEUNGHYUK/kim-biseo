<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>매출 차트</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2e3248;
      --text: #e2e8f0; --muted: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 24px; }

    h1 { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
    .sub { font-size: 0.8rem; color: var(--muted); margin-bottom: 20px; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px;
    }
    .card-title { font-size: 0.82rem; font-weight: 700; color: var(--text); margin-bottom: 14px; }
    .chart-wrap { position: relative; height: 240px; }

    .full { grid-column: 1 / -1; }
    .chart-wrap.tall { height: 200px; }

    /* KPI row */
    .kpi-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 16px; }
    .kpi {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px;
    }
    .kpi .label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing:.05em; margin-bottom: 5px; }
    .kpi .val { font-size: 1.4rem; font-weight: 800; }
    .kpi .hint { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
  </style>
</head>
<body>
  <h1>📊 매출 데이터 차트</h1>
  <p class="sub">분석 기간: 2026-01-05 ~ 2026-02-10 &nbsp;|&nbsp; 총 30건 거래 &nbsp;|&nbsp; 출처: 매출데이터.csv</p>

  <!-- KPI -->
  <div class="kpi-row">
    <div class="kpi"><div class="label">총 매출</div><div class="val" style="color:#818cf8;">7,100만원</div><div class="hint">71,006,000원</div></div>
    <div class="kpi"><div class="label">1위 제품</div><div class="val" style="color:#f472b6;">무선 이어폰</div><div class="hint">28,836,000원 · 40.6%</div></div>
    <div class="kpi"><div class="label">1위 지역</div><div class="val" style="color:#34d399;">서울</div><div class="hint">41,277,000원 · 58.1%</div></div>
    <div class="kpi"><div class="label">2월 성장</div><div class="val" style="color:#fb923c;">+38%</div><div class="hint">일평균 1월 대비</div></div>
  </div>

  <div class="grid">

    <!-- 1. 날짜별 매출 추이 (라인) -->
    <div class="card full">
      <div class="card-title">날짜별 매출 추이</div>
      <div class="chart-wrap tall"><canvas id="trendChart"></canvas></div>
    </div>

    <!-- 2. 제품별 매출 (가로 바) -->
    <div class="card">
      <div class="card-title">제품별 매출액</div>
      <div class="chart-wrap"><canvas id="productBar"></canvas></div>
    </div>

    <!-- 3. 지역별 도넛 -->
    <div class="card">
      <div class="card-title">지역별 매출 비중</div>
      <div class="chart-wrap"><canvas id="regionDonut"></canvas></div>
    </div>

    <!-- 4. 카테고리 파이 -->
    <div class="card">
      <div class="card-title">카테고리별 비중</div>
      <div class="chart-wrap"><canvas id="catPie"></canvas></div>
    </div>

    <!-- 5. 제품별 수량 바 -->
    <div class="card">
      <div class="card-title">제품별 판매 수량</div>
      <div class="chart-wrap"><canvas id="qtyBar"></canvas></div>
    </div>

  </div>

<script>
  const GRID = { color: '#2e3248' };
  const TICK = { color: '#64748b', font: { size: 11 } };
  const LEGEND = { labels: { color: '#94a3b8', font: { size: 11 }, boxWidth: 12 } };
  const COLORS = ['#818cf8','#f472b6','#34d399','#fb923c','#38bdf8','#a78bfa'];

  // 날짜별 매출 추이
  new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: {
      labels: ['1/5','1/8','1/12','1/15','1/19','1/22','1/26','2/1','2/5','2/10'],
      datasets: [
        {
          label: '일별 매출 합계',
          data: [7075000,8413000,4135000,8122000,5060000,9029000,4665000,10110000,6195000,8202000],
          borderColor: '#818cf8', backgroundColor: 'rgba(129,140,248,0.1)',
          tension: 0.4, fill: true, pointRadius: 5, pointBackgroundColor: '#818cf8',
        },
        {
          label: '전자기기',
          data: [5125000,6788000,2740000,6022000,3410000,7229000,3345000,7735000,4395000,6527000],
          borderColor: '#38bdf8', backgroundColor: 'transparent',
          tension: 0.4, borderDash: [4,3], pointRadius: 3, pointBackgroundColor: '#38bdf8',
        },
        {
          label: '생활용품',
          data: [1950000,1625000,1395000,2100000,1650000,1800000,1320000,2375000,1800000,1675000],
          borderColor: '#34d399', backgroundColor: 'transparent',
          tension: 0.4, borderDash: [4,3], pointRadius: 3, pointBackgroundColor: '#34d399',
        }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: LEGEND },
      scales: {
        y: { ticks: { ...TICK, callback: v => (v/10000).toFixed(0)+'만' }, grid: GRID },
        x: { ticks: TICK, grid: { display: false } }
      }
    }
  });

  // 제품별 매출 가로 바
  new Chart(document.getElementById('productBar'), {
    type: 'bar',
    data: {
      labels: ['무선 이어폰','텀블러','블루투스 스피커','보조배터리','에코백','무선 충전기'],
      datasets: [{
        data: [28836000,11525000,9600000,9030000,6165000,5850000],
        backgroundColor: COLORS, borderRadius: 6,
      }]
    },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${(ctx.raw/10000).toFixed(0)}만원` } }
      },
      scales: {
        x: { ticks: { ...TICK, callback: v=>(v/10000).toFixed(0)+'만' }, grid: GRID },
        y: { ticks: TICK, grid: { display: false } }
      }
    }
  });

  // 지역별 도넛
  new Chart(document.getElementById('regionDonut'), {
    type: 'doughnut',
    data: {
      labels: ['서울 58.1%','대구 22.4%','부산 19.5%'],
      datasets: [{
        data: [41277000,15907000,13822000],
        backgroundColor: ['#818cf8','#fb923c','#34d399'],
        borderWidth: 0, hoverOffset: 8
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '60%',
      plugins: {
        legend: { position: 'bottom', labels: { ...LEGEND.labels } },
        tooltip: { callbacks: { label: ctx => ` ${(ctx.raw/10000).toFixed(0)}만원` } }
      }
    }
  });

  // 카테고리 파이
  new Chart(document.getElementById('catPie'), {
    type: 'pie',
    data: {
      labels: ['전자기기 75.1%','생활용품 24.9%'],
      datasets: [{
        data: [53316000,17690000],
        backgroundColor: ['#38bdf8','#a78bfa'],
        borderWidth: 0, hoverOffset: 8
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { ...LEGEND.labels } },
        tooltip: { callbacks: { label: ctx => ` ${(ctx.raw/10000).toFixed(0)}만원` } }
      }
    }
  });

  // 제품별 수량 바
  new Chart(document.getElementById('qtyBar'), {
    type: 'bar',
    data: {
      labels: ['텀블러','에코백','무선 이어폰','보조배터리','무선 충전기','블루투스 스피커'],
      datasets: [{
        label: '판매 수량 (개)',
        data: [461,411,324,258,130,80],
        backgroundColor: COLORS, borderRadius: 6,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { ticks: TICK, grid: GRID },
        x: { ticks: { ...TICK, font: { size: 10 } }, grid: { display: false } }
      }
    }
  });
</script>
</body>
</html>
