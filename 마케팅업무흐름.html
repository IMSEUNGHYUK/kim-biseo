<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>마케팅 업무 흐름</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f0f4ff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      padding: 32px 16px;
    }
    .wrap { width: 100%; max-width: 1060px; }
  </style>
</head>
<body>
<div class="wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 500" width="100%">
  <defs>
    <!-- Background gradient: soft light blue-white -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#f8f4ff"/>
    </linearGradient>

    <!-- Step accent gradients (pastel) -->
    <linearGradient id="c1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="c2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="c3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="c4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="c5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>

    <!-- Card background: pure white -->
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f9fafb"/>
    </linearGradient>

    <filter id="cardShadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#6366f120"/>
    </filter>
    <filter id="iconShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1060" height="500" rx="28" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="60" cy="60" r="80" fill="#6366f1" opacity="0.04"/>
  <circle cx="1000" cy="440" r="100" fill="#f97316" opacity="0.05"/>
  <circle cx="530" cy="480" r="60" fill="#0ea5e9" opacity="0.04"/>

  <!-- Title -->
  <text x="530" y="54" text-anchor="middle" font-size="12" font-weight="600" fill="#a5b4fc" letter-spacing="4">MARKETING WORKFLOW</text>
  <text x="530" y="88" text-anchor="middle" font-size="28" font-weight="700" fill="#1e1b4b" letter-spacing="0.5">마케팅 업무 흐름도</text>

  <!-- Connecting dotted line -->
  <line x1="120" y1="268" x2="940" y2="268" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="6 5"/>


  <!-- ═══ STEP 1: 기획 ═══ -->
  <g transform="translate(40,148)">
    <rect x="20" y="20" width="160" height="215" rx="20" fill="url(#cardBg)" stroke="#e0e7ff" stroke-width="1.5" filter="url(#cardShadow)"/>
    <rect x="20" y="20" width="160" height="6" rx="20" fill="url(#c1)"/>
    <!-- Badge -->
    <rect x="82" y="8" width="36" height="22" rx="11" fill="url(#c1)"/>
    <text x="100" y="23.5" text-anchor="middle" font-size="10" font-weight="700" fill="white">01</text>
    <!-- Icon bg -->
    <circle cx="100" cy="108" r="42" fill="#eef2ff"/>
    <circle cx="100" cy="108" r="34" fill="url(#c1)" filter="url(#iconShadow)"/>
    <!-- Lightbulb icon -->
    <g transform="translate(100,108)" fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2">
      <path d="M0,-16 C8,-16 15,-9 15,0 C15,7 10,12 7,15 L7,18 L-7,18 L-7,15 C-10,12 -15,7 -15,0 C-15,-9 -8,-16 0,-16 Z" fill="white" fill-opacity="0.2"/>
      <path d="M0,-14 C7,-14 13,-8 13,0 C13,6 9,11 6,14"/>
      <line x1="-5" y1="19" x2="5" y2="19"/>
      <line x1="-3" y1="23" x2="3" y2="23"/>
      <line x1="0" y1="-20" x2="0" y2="-24" stroke-width="2"/>
      <line x1="-14" y1="-14" x2="-17" y2="-17" stroke-width="2"/>
      <line x1="14" y1="-14" x2="17" y2="-17" stroke-width="2"/>
    </g>
    <text x="100" y="168" text-anchor="middle" font-size="17" font-weight="700" fill="#1e1b4b">기획</text>
    <text x="100" y="186" text-anchor="middle" font-size="10" font-weight="500" fill="#818cf8">Planning</text>
    <text x="100" y="208" text-anchor="middle" font-size="10" fill="#94a3b8">· 목표 설정</text>
    <text x="100" y="224" text-anchor="middle" font-size="10" fill="#94a3b8">· 전략 수립</text>
  </g>

  <!-- Arrow 1→2 -->
  <g transform="translate(213,253)">
    <line x1="4" y1="15" x2="42" y2="15" stroke="#c7d2fe" stroke-width="2"/>
    <polygon points="36,8 50,15 36,22" fill="#818cf8"/>
  </g>

  <!-- ═══ STEP 2: 콘텐츠 제작 ═══ -->
  <g transform="translate(238,148)">
    <rect x="20" y="20" width="160" height="215" rx="20" fill="url(#cardBg)" stroke="#fce7f3" stroke-width="1.5" filter="url(#cardShadow)"/>
    <rect x="20" y="20" width="160" height="6" rx="20" fill="url(#c2)"/>
    <rect x="82" y="8" width="36" height="22" rx="11" fill="url(#c2)"/>
    <text x="100" y="23.5" text-anchor="middle" font-size="10" font-weight="700" fill="white">02</text>
    <circle cx="100" cy="108" r="42" fill="#fdf2f8"/>
    <circle cx="100" cy="108" r="34" fill="url(#c2)" filter="url(#iconShadow)"/>
    <!-- Pencil icon -->
    <g transform="translate(100,108)" fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2">
      <path d="M-7,-18 L7,-18 L7,12 L0,18 L-7,12 Z" transform="rotate(-15)" fill="white" fill-opacity="0.2"/>
      <path d="M-7,-18 L7,-18 L7,12 L0,18 L-7,12 Z" transform="rotate(-15)"/>
      <line x1="-7" y1="8" x2="7" y2="8" transform="rotate(-15)"/>
      <line x1="-5" y1="-6" x2="5" y2="-6" transform="rotate(-15)" stroke-width="1.5" opacity="0.6"/>
      <line x1="-5" y1="-1" x2="5" y2="-1" transform="rotate(-15)" stroke-width="1.5" opacity="0.6"/>
      <line x1="-5" y1="4" x2="5" y2="4" transform="rotate(-15)" stroke-width="1.5" opacity="0.6"/>
    </g>
    <text x="100" y="168" text-anchor="middle" font-size="17" font-weight="700" fill="#1e1b4b">콘텐츠 제작</text>
    <text x="100" y="186" text-anchor="middle" font-size="10" font-weight="500" fill="#f472b6">Content Creation</text>
    <text x="100" y="208" text-anchor="middle" font-size="10" fill="#94a3b8">· 카피 작성</text>
    <text x="100" y="224" text-anchor="middle" font-size="10" fill="#94a3b8">· 디자인 제작</text>
  </g>

  <!-- Arrow 2→3 -->
  <g transform="translate(411,253)">
    <line x1="4" y1="15" x2="42" y2="15" stroke="#fce7f3" stroke-width="2"/>
    <polygon points="36,8 50,15 36,22" fill="#f472b6"/>
  </g>

  <!-- ═══ STEP 3: 검토 ═══ -->
  <g transform="translate(436,148)">
    <rect x="20" y="20" width="160" height="215" rx="20" fill="url(#cardBg)" stroke="#e0f2fe" stroke-width="1.5" filter="url(#cardShadow)"/>
    <rect x="20" y="20" width="160" height="6" rx="20" fill="url(#c3)"/>
    <rect x="82" y="8" width="36" height="22" rx="11" fill="url(#c3)"/>
    <text x="100" y="23.5" text-anchor="middle" font-size="10" font-weight="700" fill="white">03</text>
    <circle cx="100" cy="108" r="42" fill="#f0f9ff"/>
    <circle cx="100" cy="108" r="34" fill="url(#c3)" filter="url(#iconShadow)"/>
    <!-- Clipboard + check -->
    <g transform="translate(100,108)" fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2">
      <rect x="-13" y="-17" width="26" height="32" rx="4" fill="white" fill-opacity="0.2"/>
      <rect x="-13" y="-17" width="26" height="32" rx="4"/>
      <rect x="-6" y="-21" width="12" height="8" rx="3" fill="white" fill-opacity="0.2"/>
      <rect x="-6" y="-21" width="12" height="8" rx="3"/>
      <polyline points="-7,3 -2,9 9,-5" stroke-width="2.8"/>
    </g>
    <text x="100" y="168" text-anchor="middle" font-size="17" font-weight="700" fill="#1e1b4b">검토</text>
    <text x="100" y="186" text-anchor="middle" font-size="10" font-weight="500" fill="#38bdf8">Review</text>
    <text x="100" y="208" text-anchor="middle" font-size="10" fill="#94a3b8">· 품질 확인</text>
    <text x="100" y="224" text-anchor="middle" font-size="10" fill="#94a3b8">· 승인 처리</text>
  </g>

  <!-- Arrow 3→4 -->
  <g transform="translate(609,253)">
    <line x1="4" y1="15" x2="42" y2="15" stroke="#bae6fd" stroke-width="2"/>
    <polygon points="36,8 50,15 36,22" fill="#38bdf8"/>
  </g>

  <!-- ═══ STEP 4: 배포 ═══ -->
  <g transform="translate(634,148)">
    <rect x="20" y="20" width="160" height="215" rx="20" fill="url(#cardBg)" stroke="#d1fae5" stroke-width="1.5" filter="url(#cardShadow)"/>
    <rect x="20" y="20" width="160" height="6" rx="20" fill="url(#c4)"/>
    <rect x="82" y="8" width="36" height="22" rx="11" fill="url(#c4)"/>
    <text x="100" y="23.5" text-anchor="middle" font-size="10" font-weight="700" fill="white">04</text>
    <circle cx="100" cy="108" r="42" fill="#f0fdf4"/>
    <circle cx="100" cy="108" r="34" fill="url(#c4)" filter="url(#iconShadow)"/>
    <!-- Rocket icon -->
    <g transform="translate(100,108)" fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2">
      <path d="M0,-19 C6,-19 13,-11 13,0 C13,7 9,13 5,16 L0,14 L-5,16 C-9,13 -13,7 -13,0 C-13,-11 -6,-19 0,-19 Z" fill="white" fill-opacity="0.2"/>
      <path d="M0,-17 C5,-17 11,-10 11,0 C11,7 8,12 5,15 L0,13 L-5,15 C-8,12 -11,7 -11,0 C-11,-10 -5,-17 0,-17 Z"/>
      <circle cx="0" cy="0" r="4.5" fill="white" fill-opacity="0.3"/>
      <circle cx="0" cy="0" r="4.5"/>
      <line x1="-7" y1="14" x2="-10" y2="22" stroke-width="2"/>
      <line x1="7" y1="14" x2="10" y2="22" stroke-width="2"/>
      <path d="M-13,3 C-19,3 -22,8 -20,13 L-13,11 Z" fill="white" fill-opacity="0.2"/>
      <path d="M-13,3 C-19,3 -22,8 -20,13 L-13,11 Z"/>
      <path d="M13,3 C19,3 22,8 20,13 L13,11 Z" fill="white" fill-opacity="0.2"/>
      <path d="M13,3 C19,3 22,8 20,13 L13,11 Z"/>
    </g>
    <text x="100" y="168" text-anchor="middle" font-size="17" font-weight="700" fill="#1e1b4b">배포</text>
    <text x="100" y="186" text-anchor="middle" font-size="10" font-weight="500" fill="#34d399">Distribution</text>
    <text x="100" y="208" text-anchor="middle" font-size="10" fill="#94a3b8">· 채널 게시</text>
    <text x="100" y="224" text-anchor="middle" font-size="10" fill="#94a3b8">· 스케줄 관리</text>
  </g>

  <!-- Arrow 4→5 -->
  <g transform="translate(807,253)">
    <line x1="4" y1="15" x2="42" y2="15" stroke="#bbf7d0" stroke-width="2"/>
    <polygon points="36,8 50,15 36,22" fill="#34d399"/>
  </g>

  <!-- ═══ STEP 5: 성과 분석 ═══ -->
  <g transform="translate(832,148)">
    <rect x="20" y="20" width="160" height="215" rx="20" fill="url(#cardBg)" stroke="#ffedd5" stroke-width="1.5" filter="url(#cardShadow)"/>
    <rect x="20" y="20" width="160" height="6" rx="20" fill="url(#c5)"/>
    <rect x="82" y="8" width="36" height="22" rx="11" fill="url(#c5)"/>
    <text x="100" y="23.5" text-anchor="middle" font-size="10" font-weight="700" fill="white">05</text>
    <circle cx="100" cy="108" r="42" fill="#fff7ed"/>
    <circle cx="100" cy="108" r="34" fill="url(#c5)" filter="url(#iconShadow)"/>
    <!-- Bar chart + trend -->
    <g transform="translate(100,108)" fill="none" stroke="white" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2">
      <rect x="-17" y="2" width="8" height="14" rx="2" fill="white" fill-opacity="0.25"/>
      <rect x="-17" y="2" width="8" height="14" rx="2"/>
      <rect x="-5" y="-8" width="8" height="24" rx="2" fill="white" fill-opacity="0.25"/>
      <rect x="-5" y="-8" width="8" height="24" rx="2"/>
      <rect x="7" y="-3" width="8" height="19" rx="2" fill="white" fill-opacity="0.25"/>
      <rect x="7" y="-3" width="8" height="19" rx="2"/>
      <line x1="-19" y1="17" x2="17" y2="17"/>
      <polyline points="-13,-4 -1,-14 11,-8 17,-16" stroke-width="2" opacity="0.85"/>
      <circle cx="17" cy="-16" r="2.5" fill="white"/>
    </g>
    <text x="100" y="168" text-anchor="middle" font-size="17" font-weight="700" fill="#1e1b4b">성과 분석</text>
    <text x="100" y="186" text-anchor="middle" font-size="10" font-weight="500" fill="#fb923c">Analytics</text>
    <text x="100" y="208" text-anchor="middle" font-size="10" fill="#94a3b8">· KPI 측정</text>
    <text x="100" y="224" text-anchor="middle" font-size="10" fill="#94a3b8">· 인사이트 도출</text>
  </g>

  <!-- Feedback loop -->
  <path d="M932,403 Q932,448 530,448 Q128,448 128,403"
        fill="none" stroke="#c7d2fe" stroke-width="1.5" stroke-dasharray="5 4"/>
  <polygon points="120,396 128,410 136,396" fill="#818cf8" opacity="0.7"/>
  <rect x="420" y="436" width="220" height="22" rx="11" fill="white" opacity="0.7"/>
  <text x="530" y="451" text-anchor="middle" font-size="10" font-weight="500" fill="#6366f1" letter-spacing="1">결과를 반영하여 다음 기획에 적용</text>
</svg>
</div>
</body>
</html>
